<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<link href="PRODUCT-PREVIEW.css" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <article class="product-card">
<img src="images\image-product-mobile.jpg" alt="product image" class="product-image">
 <div class="product-text">
<span class="font-light spaced">PERFUME</span>

  <h1>Gabrielle Essence Eau De Parfum</h1>

  <p class="font-light">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</p>

 <span class="dis-price"> $149.99 </span>
  <span class="org-price">$169.99</span>
  <br>

  <button><img src="images\icon-cart.svg" class="cart" >Add to Cart</button>
  </div>
  </article>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Maryam Sheraz</a>.
  </footer>
</body>
</html>
